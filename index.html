<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Data Hub — API Console</title>
<style>
  :root {
    --bg: #0d0f12;
    --panel: #14171c;
    --panel-2: #1a1e24;
    --border: #262b33;
    --text: #e6e8eb;
    --text-dim: #8a919c;
    --accent: #4fd1a5;
    --get: #4fa1ff;
    --post: #4fd1a5;
    --put: #ffb454;
    --delete: #ff6b6b;
    --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header .title { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  header .title span { color: var(--accent); }
  header .status {
    font-size: 12px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  header .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 61px);
  }
  nav {
    border-right: 1px solid var(--border);
    padding: 16px 0;
  }
  nav .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 0 20px 8px;
  }
  .ep {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
  }
  .ep:hover { background: var(--panel-2); }
  .ep.active { background: var(--panel-2); border-left-color: var(--accent); }
  .ep .method {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    min-width: 42px;
    text-align: center;
  }
  .m-GET { background: rgba(79,161,255,0.15); color: var(--get); }
  .m-POST { background: rgba(79,209,165,0.15); color: var(--post); }
  .m-PUT { background: rgba(255,180,84,0.15); color: var(--put); }
  .m-DELETE { background: rgba(255,107,107,0.15); color: var(--delete); }
  .ep .path { color: var(--text-dim); font-size: 12px; }
  main { padding: 28px; }
  .req-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .req-head .method-badge {
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 4px;
  }
  .req-head .path-label { color: var(--text-dim); font-size: 13px; }
  .field-grid {
    display: grid;
    gap: 10px;
    margin-bottom: 16px;
    max-width: 480px;
  }
  .field-grid input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .field-grid input::placeholder { color: var(--text-dim); }
  .field-grid input:focus { outline: none; border-color: var(--accent); }
  button.send {
    background: var(--accent);
    color: #0d0f12;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 20px;
  }
  button.send:hover { opacity: 0.9; }
  .console {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    max-width: 640px;
  }
  .console .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }
  .console pre {
    margin: 0;
    font-size: 12.5px;
    line-height: 1.6;
    color: #9fe6c4;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>
<body>

<header>
  <div class="title">the data hub <span>/ api console</span></div>
  <div class="status"><span class="dot"></span> server running</div>
</header>

<div class="layout">
  <nav>
    <div class="label">Endpoints</div>
    <div id="ep-list"></div>
  </nav>

  <main>
    <div class="req-head">
      <span id="method-badge" class="method-badge"></span>
      <span id="path-label" class="path-label"></span>
    </div>

    <div id="form-fields" class="field-grid"></div>

    <button class="send" id="send-btn">Send request →</button>

    <div class="console">
      <div class="label">Response</div>
      <pre id="response-out">// response will appear here</pre>
    </div>
  </main>
</div>

<script>
  // Change this if your API is not on the same origin
  const BASE_URL = "";

  const endpoints = [
    { method: "GET", path: "/api/health", fields: [] },
    { method: "GET", path: "/api/blogs", fields: [] },
    { method: "POST", path: "/api/blogs", fields: ["title", "content", "author"] },
    { method: "GET", path: "/api/blogs/:id", fields: ["id"] },
    { method: "PUT", path: "/api/blogs/:id", fields: ["id", "title", "content"] },
    { method: "DELETE", path: "/api/blogs/:id", fields: ["id"] }
  ];

  let activeIdx = 1;

  function renderList() {
    const list = document.getElementById("ep-list");
    list.innerHTML = "";
    endpoints.forEach((ep, i) => {
      const row = document.createElement("div");
      row.className = "ep" + (i === activeIdx ? " active" : "");
      row.innerHTML = `<span class="method m-${ep.method}">${ep.method}</span><span class="path">${ep.path}</span>`;
      row.onclick = () => { activeIdx = i; renderList(); renderForm(); };
      list.appendChild(row);
    });
  }

  function renderForm() {
    const ep = endpoints[activeIdx];
    const badge = document.getElementById("method-badge");
    badge.textContent = ep.method;
    badge.className = "method-badge m-" + ep.method;
    document.getElementById("path-label").textContent = BASE_URL + ep.path;

    const fieldsEl = document.getElementById("form-fields");
    fieldsEl.innerHTML = "";
    ep.fields.forEach(f => {
      const input = document.createElement("input");
      input.placeholder = f;
      input.id = "field-" + f;
      fieldsEl.appendChild(input);
    });
  }

  function val(f) {
    const el = document.getElementById("field-" + f);
    return el ? el.value.trim() : "";
  }

  function showResponse(status, body) {
    document.getElementById("response-out").textContent =
      "// status: " + status + "\n" + JSON.stringify(body, null, 2);
  }

  document.getElementById("send-btn").onclick = async () => {
    const ep = endpoints[activeIdx];
    let url = BASE_URL + ep.path;
    let options = { method: ep.method, headers: { "Content-Type": "application/json" } };

    if (ep.path.includes(":id")) {
      url = url.replace(":id", val("id") || "");
    }

    if (ep.method === "POST" || ep.method === "PUT") {
      const body = {};
      ep.fields.forEach(f => {
        if (f !== "id" && val(f)) body[f] = val(f);
      });
      options.body = JSON.stringify(body);
    }

    showResponse("...", { message: "sending request" });

    try {
      const res = await fetch(url, options);
      const data = await res.json().catch(() => ({}));
      showResponse(res.status, data);
    } catch (err) {
      showResponse("error", { success: false, message: err.message });
    }
  };

  renderList();
  renderForm();
</script>

</body>
</html>
